uses: actions/github-script@v8
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
with:
  script: |
    const comment = context.payload.comment.body;

    if (!comment.includes('@claude')) return;

    const prompt = comment.replace('@claude', '').trim();

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "x-api-key": process.env.ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
        "content-type": "application/json"
      },
      body: JSON.stringify({
        model: "claude-3-haiku-20240307",
        max_tokens: 1000,
        messages: [
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    const data = await response.json();

    let reply = "";

    if (data.error) {
      reply = `❌ Claude API Error:\n\n${data.error.message}`;
    } else if (data.content && data.content.length > 0) {
      reply = data.content.map(c => c.text).join("\n");
    } else {
      reply = "⚠️ No valid response from Claude.";
    }

    github.rest.issues.createComment({
      owner: context.repo.owner,
      repo: context.repo.repo,
      issue_number: context.issue.number,
      body: `🤖 **Claude Response:**\n\n${reply}`
    });
