name: Claude Automation

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Check for @claude
        id: check
        run: |
          if [[ "${{ github.event.comment.body }}" == *"@claude"* ]]; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no @claude
        if: steps.check.outputs.trigger != 'true'
        run: exit 0

      - name: Respond in issue
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👋 Claude received your request:\n\n${comment}`
            });
