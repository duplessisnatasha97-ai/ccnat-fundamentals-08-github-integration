name: Claude AI Automation

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Claude with file support
        uses: actions/github-script@v8
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            if (!context.payload.comment) return;

            const comment = context.payload.comment.body;

            if (!comment.includes('@claude')) return;

            const prompt = comment.replace('@claude', '').trim();

            let fileContent = "";
            try {
              fileContent = fs.readFileSync("data.csv", "utf8");
            } catch (e) {
              fileContent = "No data.csv file found in repo.";
            }
const fullPrompt =
 
   "You are a construction business development assistant.\n\n" +
   "Your job:\n" +
   "- Analyse the data\n" +
   "- Prioritise leads\n" +
   "- Generate personalised outreach messages (email + LinkedIn)\n" +
   "- Suggest follow-ups\n\n" +
  "DATA:\n" +
   fileContent +
  "\n\nUSER REQUEST:\n" +
  prompt;
  
            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
                "content-type": "application/json"
              },
              body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 1500,
                messages: [
                  {
                    role: "user",
                    content: fullPrompt
                  }
                ]
              })
            });

            const data = await response.json();

            let reply = "";

            if (data.error) {
              reply = `❌ Claude API Error:\n\n${data.error.message}`;
            } else if (data.content && data.content.length > 0) {
              reply = data.content.map(c => c.text).join("\n");
            } else {
              reply = "⚠️ No valid response.";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Claude Output:**\n\n${reply}`
            });
