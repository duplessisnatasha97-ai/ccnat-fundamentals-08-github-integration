name: Claude AI Automation

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Run Claude when mentioned
        uses: actions/github-script@v8
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const comment = context.payload.comment.body;

            if (!comment.includes('@claude')) return;

            const prompt = comment.replace('@claude', '').trim();

            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "x-api-key": process.env.ANTHROPIC_API_KEY,
                "anthropic-version": "2023-06-01",
                "content-type": "application/json"
              },
              body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 1000,
                messages: [
                  {
                    role: "user",
                    content: prompt
                  }
                ]
              })
            });

            const data = await response.json();

            const reply = data.content?.[0]?.text || "No response from Claude.";

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Claude Response:**\n\n${reply}`
            });
